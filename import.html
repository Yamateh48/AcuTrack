function log(msg, cls='info'){
  const d=document.getElementById('log');
  const line=document.createElement('div');
  line.className=cls; line.textContent=msg;
  d.appendChild(line); d.scrollTop=d.scrollHeight;
}
function setBar(pct){ document.getElementById('bar').style.width=pct+'%'; }

async function startImport(){
  const btn=document.getElementById('btn');
  btn.disabled=true; btn.textContent='⏳ กำลังนำเข้า...';
  log('🔌 เชื่อมต่อ Firebase...');
  
  try{
    if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    const db=firebase.firestore();
    await db.collection('_ping').doc('test').set({t:Date.now()});
    log('✅ เชื่อมต่อ Firebase สำเร็จ','ok');
  }catch(e){
    log('❌ เชื่อมต่อ Firebase ไม่ได้: '+e.message,'err');
    btn.disabled=false; btn.textContent='🚀 ลองใหม่';
    return;
  }

  const db=firebase.firestore();
  const daily=IMPORT_DATA.dailyRecords;
  const monthly=IMPORT_DATA.monthlyRevenue;
  const total=daily.length+monthly.length;
  let done=0, errors=0;

  log(`📋 บันทึกรายวัน: ${daily.length} วัน | รายได้รายเดือน: ${monthly.length} เดือน`);
  log('── เริ่มนำเข้าบันทึกรายวัน ──');

  // Import daily records in batches of 20
  const BATCH_SIZE=20;
  for(let i=0;i<daily.length;i+=BATCH_SIZE){
    const batch=db.batch();
    const chunk=daily.slice(i,i+BATCH_SIZE);
    for(const r of chunk){
      const ref=db.collection('dailyRecords').doc(r.date);
      batch.set(ref,r);
    }
    try{
      await batch.commit();
      done+=chunk.length;
      setBar(Math.round(done/total*100));
      const last=chunk[chunk.length-1].date;
      log(`  ✓ ${i+1}–${Math.min(i+BATCH_SIZE,daily.length)}: ถึง ${last}`,'ok');
    }catch(e){
      errors++;
      log(`  ✗ batch ${i}: ${e.message}`,'err');
    }
  }

  log('── เริ่มนำเข้ารายได้รายเดือน ──');
  for(const r of monthly){
    try{
      await db.collection('monthlyRevenue').doc(r.yearMonth).set(r);
      done++;
      setBar(Math.round(done/total*100));
      log(`  ✓ ${r.yearMonth}: ฿${r.revenue.toLocaleString()} | ${r.visits} ครั้ง`,'ok');
    }catch(e){
      errors++;
      log(`  ✗ ${r.yearMonth}: ${e.message}`,'err');
    }
  }

  setBar(100);
  if(errors===0){
    log(`\n🎉 นำเข้าสำเร็จทั้งหมด! ${done} รายการ`,'ok');
    btn.textContent='✅ นำเข้าสำเร็จ';
  }else{
    log(`\n⚠️ เสร็จสิ้น: สำเร็จ ${done} รายการ | ผิดพลาด ${errors} รายการ`,'err');
    btn.disabled=false; btn.textContent='🔄 ลองใหม่';
  }
}
</script>
